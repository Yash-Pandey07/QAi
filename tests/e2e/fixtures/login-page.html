<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-start: #0f0c29;
      --bg-mid:   #302b63;
      --bg-end:   #24243e;
      --card-bg:  rgba(255, 255, 255, 0.06);
      --card-border: rgba(255, 255, 255, 0.12);
      --accent:   #7c5cfc;
      --accent-hover: #9b7dff;
      --text:     #e8e6f0;
      --text-muted: #9895ae;
      --input-bg: rgba(255, 255, 255, 0.07);
      --input-border: rgba(255, 255, 255, 0.15);
      --input-focus: rgba(124, 92, 252, 0.5);
      --error:    #ff4d6a;
      --success:  #34d399;
      --font:     'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
      color: var(--text);
      overflow: hidden;
    }

    /* ── Animated Background Orbs ───────────────────────────────── */
    .bg-orbs {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .bg-orbs .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 18s ease-in-out infinite;
    }
    .bg-orbs .orb:nth-child(1) {
      width: 420px; height: 420px;
      background: #7c5cfc;
      top: -10%; left: -5%;
      animation-delay: 0s;
    }
    .bg-orbs .orb:nth-child(2) {
      width: 350px; height: 350px;
      background: #e040fb;
      bottom: -15%; right: -8%;
      animation-delay: -6s;
    }
    .bg-orbs .orb:nth-child(3) {
      width: 280px; height: 280px;
      background: #00bcd4;
      top: 50%; left: 60%;
      animation-delay: -12s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(40px, -30px) scale(1.05); }
      66%      { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* ── Login Container ────────────────────────────────────────── */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 1.25rem;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.75rem 2.25rem 2.25rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.05),
        0 24px 80px rgba(0,0,0,0.45);
      animation: cardIn 0.6s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(32px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* ── Logo ───────────────────────────────────────────────────── */
    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-bottom: 0.5rem;
    }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), #e040fb);
      border-radius: 12px;
      display: grid;
      place-items: center;
    }
    .logo-icon svg { width: 24px; height: 24px; }
    .logo-text {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #c2b6ff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    .tagline {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }

    /* ── Form ───────────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      width: 18px; height: 18px;
      color: var(--text-muted);
      transition: color 0.2s;
      pointer-events: none;
    }

    .input-wrapper input {
      width: 100%;
      padding: 0.8rem 0.9rem 0.8rem 2.65rem;
      font-family: var(--font);
      font-size: 0.95rem;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .input-wrapper input::placeholder {
      color: rgba(255,255,255,0.25);
    }

    .input-wrapper input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--input-focus);
    }

    .input-wrapper input:focus ~ .icon {
      color: var(--accent);
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: grid;
      place-items: center;
      transition: color 0.2s;
    }
    .toggle-password:hover { color: var(--text); }
    .toggle-password svg { width: 18px; height: 18px; }

    /* ── Remember + Forgot ──────────────────────────────────────── */
    .form-extras {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 0.82rem;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      color: var(--text-muted);
      user-select: none;
    }
    .remember input[type="checkbox"] {
      accent-color: var(--accent);
      width: 15px; height: 15px;
      cursor: pointer;
    }

    .forgot-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot-link:hover { color: var(--accent-hover); }

    /* ── Submit Button ──────────────────────────────────────────── */
    .btn-login {
      width: 100%;
      padding: 0.85rem;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #9b7dff);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 32px rgba(124,92,252,0.4);
    }
    .btn-login:hover::before { transform: translateX(100%); }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 16px rgba(124,92,252,0.3);
    }

    .btn-login.loading {
      pointer-events: none;
      opacity: 0.85;
    }

    .btn-login .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin: 0 auto;
    }

    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .spinner  { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Divider ────────────────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
      color: var(--text-muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--input-border);
    }

    /* ── Social Buttons ─────────────────────────────────────────── */
    .social-row {
      display: flex;
      gap: 0.75rem;
    }

    .btn-social {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.7rem;
      font-family: var(--font);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }
    .btn-social svg { width: 18px; height: 18px; }
    .btn-social:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    /* ── Footer Link ────────────────────────────────────────────── */
    .signup-prompt {
      text-align: center;
      margin-top: 1.75rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .signup-prompt a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.2s;
    }
    .signup-prompt a:hover { color: var(--accent-hover); }

    /* ── Error / Success Banners ────────────────────────────────── */
    .banner {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1.25rem;
      animation: bannerIn 0.35s ease;
    }
    .banner.show { display: flex; }
    .banner.error {
      background: rgba(255, 77, 106, 0.12);
      border: 1px solid rgba(255, 77, 106, 0.25);
      color: var(--error);
    }
    .banner.success {
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.25);
      color: var(--success);
    }
    .banner svg { width: 18px; height: 18px; flex-shrink: 0; }

    @keyframes bannerIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Dashboard (post-login) ─────────────────────────────────── */
    .dashboard {
      display: none;
      text-align: center;
      animation: cardIn 0.5s ease both;
    }
    .dashboard.show { display: block; }

    .dashboard .avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #e040fb);
      display: grid;
      place-items: center;
      margin: 0 auto 1rem;
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
    }

    .dashboard h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .dashboard .subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    .dashboard .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }
    .stat-card {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 14px;
      padding: 1rem 0.5rem;
    }
    .stat-card .value {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #e040fb);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-card .label {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-logout {
      padding: 0.7rem 2rem;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .btn-logout:hover {
      background: rgba(255,77,106,0.1);
      border-color: rgba(255,77,106,0.25);
      color: var(--error);
    }

    /* ── Utility ────────────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Animated background orbs -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <main class="login-wrapper">
    <!-- ═════════ LOGIN CARD ═════════ -->
    <div class="login-card" id="login-card">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <span class="logo-text">Nexus</span>
      </div>
      <p class="tagline">Sign in to your workspace</p>

      <!-- Error / Success Banner -->
      <div class="banner error" id="error-banner" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
        <span id="error-text">Invalid email or password.</span>
      </div>
      <div class="banner success" id="success-banner" role="status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <span id="success-text">Login successful! Redirecting…</span>
      </div>

      <form id="login-form" novalidate autocomplete="off">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <input type="email" id="email" name="email" placeholder="you@example.com" required aria-label="Email address" />
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" name="password" placeholder="••••••••" required minlength="6" aria-label="Password" />
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <button type="button" class="toggle-password" id="toggle-password" aria-label="Toggle password visibility">
              <svg id="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="eye-closed" class="hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-extras">
          <label class="remember">
            <input type="checkbox" id="remember" name="remember" />
            Remember me
          </label>
          <a href="#" class="forgot-link" id="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="btn-login" id="login-button">
          <span class="btn-text">Sign In</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="divider">or continue with</div>

      <div class="social-row">
        <button class="btn-social" id="btn-google" type="button">
          <svg viewBox="0 0 24 24">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>
        <button class="btn-social" id="btn-github" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.44 9.8 8.21 11.39.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.61-4.04-1.61-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.21.08 1.85 1.24 1.85 1.24 1.07 1.84 2.81 1.31 3.5 1 .11-.78.42-1.31.76-1.61-2.67-.3-5.47-1.33-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.12-.3-.54-1.52.12-3.18 0 0 1.01-.32 3.3 1.23a11.5 11.5 0 016.02 0c2.28-1.55 3.29-1.23 3.29-1.23.66 1.66.24 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.63-5.48 5.92.43.37.81 1.1.81 2.22v3.29c0 .32.21.7.82.58C20.57 21.8 24 17.3 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          GitHub
        </button>
      </div>

      <p class="signup-prompt">
        Don't have an account? <a href="#" id="signup-link">Create one</a>
      </p>
    </div>

    <!-- ═════════ DASHBOARD (shown after login) ═════════ -->
    <div class="login-card dashboard" id="dashboard">
      <div class="avatar" id="user-avatar">U</div>
      <h2 id="welcome-heading">Welcome back!</h2>
      <p class="subtitle" id="welcome-email">user@example.com</p>

      <div class="stats">
        <div class="stat-card">
          <div class="value">12</div>
          <div class="label">Projects</div>
        </div>
        <div class="stat-card">
          <div class="value">48</div>
          <div class="label">Tasks</div>
        </div>
        <div class="stat-card">
          <div class="value">97%</div>
          <div class="label">Uptime</div>
        </div>
      </div>

      <button class="btn-logout" id="logout-button">Sign Out</button>
    </div>
  </main>

  <script>
    // ───────────────────────────────────────────────────────────────
    //  Accepted credentials (client-side demo only)
    // ───────────────────────────────────────────────────────────────
    const VALID_USERS = [
      { email: 'admin@nexus.io',   password: 'Admin123!', name: 'Alex' },
      { email: 'test@example.com', password: 'Test1234',  name: 'Tester' },
      { email: 'demo@nexus.io',    password: 'Demo2024',  name: 'Demo' },
    ];

    // ───────────────────────────────────────────────────────────────
    //  DOM References
    // ───────────────────────────────────────────────────────────────
    const form          = document.getElementById('login-form');
    const emailInput    = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const loginButton   = document.getElementById('login-button');
    const errorBanner   = document.getElementById('error-banner');
    const errorText     = document.getElementById('error-text');
    const successBanner = document.getElementById('success-banner');
    const togglePwdBtn  = document.getElementById('toggle-password');
    const eyeOpen       = document.getElementById('eye-open');
    const eyeClosed     = document.getElementById('eye-closed');
    const loginCard     = document.getElementById('login-card');
    const dashboard     = document.getElementById('dashboard');
    const welcomeHead   = document.getElementById('welcome-heading');
    const welcomeEmail  = document.getElementById('welcome-email');
    const userAvatar    = document.getElementById('user-avatar');
    const logoutButton  = document.getElementById('logout-button');

    // ───────────────────────────────────────────────────────────────
    //  Toggle password visibility
    // ───────────────────────────────────────────────────────────────
    togglePwdBtn.addEventListener('click', () => {
      const isPwd = passwordInput.type === 'password';
      passwordInput.type = isPwd ? 'text' : 'password';
      eyeOpen.classList.toggle('hidden', !isPwd);
      eyeClosed.classList.toggle('hidden', isPwd);
    });

    // ───────────────────────────────────────────────────────────────
    //  Form Submission
    // ───────────────────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideBanners();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      // Basic validation
      if (!email || !password) {
        showError('Please enter both email and password.');
        return;
      }

      if (!email.includes('@')) {
        showError('Please enter a valid email address.');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters.');
        return;
      }

      // Show loading state
      loginButton.classList.add('loading');

      // Simulate network delay
      await sleep(1200);

      // Authenticate
      const user = VALID_USERS.find(
        u => u.email.toLowerCase() === email.toLowerCase() && u.password === password
      );

      loginButton.classList.remove('loading');

      if (user) {
        showSuccess(`Welcome back, ${user.name}! Redirecting…`);
        await sleep(800);
        showDashboard(user);
      } else {
        showError('Invalid email or password. Please try again.');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    // ───────────────────────────────────────────────────────────────
    //  Logout
    // ───────────────────────────────────────────────────────────────
    logoutButton.addEventListener('click', () => {
      dashboard.classList.remove('show');
      loginCard.style.display = '';
      emailInput.value = '';
      passwordInput.value = '';
      hideBanners();
      emailInput.focus();
    });

    // ───────────────────────────────────────────────────────────────
    //  Helpers
    // ───────────────────────────────────────────────────────────────
    function showError(msg) {
      errorText.textContent = msg;
      errorBanner.classList.add('show');
    }

    function showSuccess(msg) {
      document.getElementById('success-text').textContent = msg;
      successBanner.classList.add('show');
    }

    function hideBanners() {
      errorBanner.classList.remove('show');
      successBanner.classList.remove('show');
    }

    function showDashboard(user) {
      loginCard.style.display = 'none';
      welcomeHead.textContent = `Welcome back, ${user.name}!`;
      welcomeEmail.textContent = user.email;
      userAvatar.textContent = user.name[0].toUpperCase();
      dashboard.classList.add('show');
    }

    function sleep(ms) {
      return new Promise(r => setTimeout(r, ms));
    }
  </script>
</body>
</html>
